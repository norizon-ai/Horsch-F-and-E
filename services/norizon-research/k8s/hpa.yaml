apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: norizon-research-frontend-hpa
  namespace: norizon-research
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: norizon-research-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: norizon-deepresearch-hpa
  namespace: norizon-research
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: norizon-deepresearch
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
