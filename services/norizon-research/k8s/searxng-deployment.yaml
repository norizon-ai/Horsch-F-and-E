apiVersion: apps/v1
kind: Deployment
metadata:
  name: norizon-searxng
  namespace: norizon-research
  labels:
    app: norizon-searxng
    tier: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: norizon-searxng
  template:
    metadata:
      labels:
        app: norizon-searxng
        tier: search
    spec:
      containers:
      - name: searxng
        image: searxng/searxng:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SEARXNG_BASE_URL
          value: "http://localhost:8080/"
        volumeMounts:
        - name: searxng-config
          mountPath: /etc/searxng
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: searxng-config
        persistentVolumeClaim:
          claimName: searxng-config-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: norizon-searxng-service
  namespace: norizon-research
  labels:
    app: norizon-searxng
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: norizon-searxng
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-config-pvc
  namespace: norizon-research
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
