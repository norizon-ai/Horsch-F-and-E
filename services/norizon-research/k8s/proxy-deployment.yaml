apiVersion: apps/v1
kind: Deployment
metadata:
  name: norizon-proxy
  namespace: norizon-research
  labels:
    app: norizon-proxy
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: norizon-proxy
  template:
    metadata:
      labels:
        app: norizon-proxy
        tier: backend
    spec:
      containers:
      - name: proxy
        image: omarkh98/nora-proxy:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5002
          name: http
        env:
        - name: DEEPRESEARCH_URL
          value: "http://norizon-deepresearch-service:5000"
        - name: PROXY_PORT
          value: "5002"
        - name: REQUEST_TIMEOUT
          value: "300"
        - name: CORS_ORIGINS
          value: "*"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: norizon-proxy-service
  namespace: norizon-research
  labels:
    app: norizon-proxy
spec:
  type: ClusterIP
  ports:
  - port: 5002
    targetPort: 5002
    protocol: TCP
    name: http
  selector:
    app: norizon-proxy
