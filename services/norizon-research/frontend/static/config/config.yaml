# =============================================================================
# NORA FRONTEND CONFIGURATION
# =============================================================================
# This file contains customer-configurable settings for the Nora frontend.
# Copy this file to /config/config.yaml and customize as needed.
#
# To deploy custom settings:
# 1. Edit this file with your company-specific content
# 2. Place it in the /config/ directory of your deployment
# 3. The frontend will automatically load these settings on startup
# =============================================================================

# -----------------------------------------------------------------------------
# ASSISTANT BRANDING
# -----------------------------------------------------------------------------
# Customize the assistant's name and logo
assistant:
  name: Nora
  logo: /favicon.png

# -----------------------------------------------------------------------------
# WELCOME SCREEN
# -----------------------------------------------------------------------------
# Customize the welcome message shown to users
welcome:
  title: Wie kann ich Ihnen helfen?
  subtitle: Stellen Sie mir eine Frage und ich durchsuche Ihre verbundenen Quellen nach umfassenden Antworten.
  disclaimer: Nora durchsucht verbundene Quellen. Quellenangaben bei kritischen Entscheidungen prüfen.

# -----------------------------------------------------------------------------
# EXAMPLE QUESTIONS
# -----------------------------------------------------------------------------
# These are the suggested questions shown on the welcome screen.
# Customize these to match your company's most common use cases.
#
# Each question has:
#   - id: unique identifier (for tracking)
#   - title: short label shown on the button
#   - question: the full question to submit
#   - description: (optional) shorter description for the button
#
# You can have 2-6 example questions. The grid will adapt automatically.
example_questions:
  - id: processes
    title: Prozesse
    question: Wie funktioniert unser Onboarding-Prozess?
    description: Wie funktioniert unser Onboarding-Prozess?

  - id: documentation
    title: Dokumentation
    question: Wo finde ich die Dokumentation zu unseren Produkten?
    description: Wo finde ich die Produktdokumentation?

  - id: policies
    title: Richtlinien
    question: Was sind die aktuellen Richtlinien für Homeoffice?
    description: Was sind die Homeoffice-Richtlinien?

  - id: contacts
    title: Kontakte
    question: Wer ist der Ansprechpartner für IT-Support?
    description: Wer ist Ansprechpartner für IT-Support?

# -----------------------------------------------------------------------------
# SEARCH STATUS MESSAGES
# -----------------------------------------------------------------------------
# Messages shown during search progress
search_messages:
  thinking: Nora denkt nach...
  writing: Antwort wird erstellt...
  complete: Suche abgeschlossen
  documents_found: "{count} Dokument(e) gefunden"

# -----------------------------------------------------------------------------
# SOURCE TYPE LABELS
# -----------------------------------------------------------------------------
# Display names for different data source types
source_types:
  sharepoint: SharePoint
  confluence: Confluence
  wiki: Internes Wiki
  jira: Jira
  web: Web
  elasticsearch: Wissensdatenbank
  document: Dokument

# -----------------------------------------------------------------------------
# UI LABELS
# -----------------------------------------------------------------------------
# Various UI text labels (can be translated)
ui:
  copy: Kopieren
  regenerate: Neu generieren
  share: Teilen
  new_chat: Neuer Chat
  your_chats: Ihre Chats
  no_chats: Noch keine Chats. Starten Sie eine Unterhaltung!
  continue_session: Letzte Sitzung fortsetzen
  delete_confirm: Möchten Sie diese Sitzung wirklich löschen?
  sources_title: Quellen
  show_all: Alle anzeigen
  show_less: Weniger anzeigen

# -----------------------------------------------------------------------------
# LANGUAGE SETTINGS
# -----------------------------------------------------------------------------
language:
  default: de
  available:
    - de
    - en
