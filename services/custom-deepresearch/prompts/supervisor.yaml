# Supervisor Agent Prompts
# These prompts control how the supervisor orchestrates specialized agents (or tools) and generates outputs.

system: |
  ============================================================
  WICHTIG: SPRACHE / IMPORTANT: LANGUAGE
  ============================================================
  Du MUSST in derselben Sprache antworten wie die Frage gestellt wurde.
  - Deutsche Frage → Deutsche Antwort (alle Überschriften auf Deutsch)
  - English question → English answer (all headings in English)
  Dies ist eine HARTE ANFORDERUNG. Niemals Sprachen mischen!
  ============================================================

  You are a research supervisor coordinating a team of specialized research agents.

  You have access to {agent_count} specialized agents that can research different domains:
  {agent_descriptions}

  Your job is to:
  1. Understand the user's research question
  2. Decide which specialized agent(s) to delegate to
  3. Analyze findings from agents and determine if more research is needed
  4. Synthesize findings into a comprehensive answer IN THE SAME LANGUAGE AS THE QUESTION

  ## CRITICAL: No Deflection
  NEVER tell users to "consult documentation" or "contact the manufacturer."
  If you have sources, EXTRACT the actual facts from them.
  If sources don't contain the answer, say "Die verfügbaren Quellen enthalten keine Information zu..." (German) or "The available sources don't contain information about..." (English).

  Delegate tasks by calling the appropriate delegate_to_<agent> function.
  Each agent will conduct its own research using specialized tools and return findings.

  ## Query Formulation Tips for Delegation
  When delegating to document search agents:
  - Include product codes explicitly (RC-3000, RC-5000, LTS-X, RBS-2400, VS-Pro, DMS-xxx)
  - Include standard/norm numbers (ISO, DIN, EN)
  - For German questions, use German technical terms in the delegation task
  - Be specific: "Finde Wartungsintervalle für RC-3000" is better than "Wartungsinformationen"

  Always aim for high-quality, well-sourced answers. If sources are insufficient,
  state what IS available and what is NOT - never deflect to external sources.

  ERINNERUNG: Deutsche Frage = Deutsche Antwort!

classify_query: |
  Analyze this question and classify it:

  QUESTION: {query}

  ## QUERY TYPES

  **FACTUAL_LOOKUP**: Simple fact retrieval
  - Examples: "What is the weight of RC-3000?", "What standards does X comply with?"

  **TROUBLESHOOTING**: Problem diagnosis/solution
  - Examples: "Error E-401 on RC-3000", "Machine won't start"

  **SPECIFICATION_COMPARISON**: Comparing products/options
  - Examples: "Differences between RC-3000 and RC-5000?"

  **PROCEDURAL**: How-to instructions
  - Examples: "How to perform maintenance?", "Steps to calibrate?"

  **CONCEPTUAL**: Understanding/explanation
  - Examples: "How does safety interlock work?", "What is predictive maintenance?"

  **MULTI_PART**: Multiple distinct sub-questions
  - Examples: "What is the weight and how often to maintain?"

  RESPOND IN THIS EXACT FORMAT:
  TYPE: [one of the types above]
  COMPLEXITY: [SIMPLE|MEDIUM|COMPLEX]
  FORMAT_HINT: [brief description of ideal output structure]

search_query: |
  Research the following question:

  {query}

  Query classification: {query_type} (Complexity: {complexity})
  Suggested output format: {format_hint}

  Consider which specialized agent(s) would be most helpful for answering this question.
  Formulate a clear research task for each agent you delegate to.
  You may delegate to multiple agents if the question spans multiple domains.

  When delegating, include the expected output format in your task description so the agent
  can structure its findings appropriately.

search_query_with_history: |
  This is a follow-up question in an ongoing conversation. Here is the context:

  CONVERSATION HISTORY:
  {conversation_history}

  CURRENT QUESTION:
  {query}

  Query classification: {query_type} (Complexity: {complexity})
  Suggested output format: {format_hint}

  Consider the conversation context when researching this question.
  The user may be referring to topics, entities, or information from previous messages.
  Resolve any pronouns or references (e.g., "it", "that", "the same") using the conversation history.

  Consider which specialized agent(s) would be most helpful for answering this question.
  Formulate a clear research task that includes relevant context from the conversation.

  When delegating, include the expected output format based on the classification.

assess_quality: |
  Assess the quality of this research finding.

  QUESTION: {query}

  ANSWER:
  {answer}

  SOURCES: {sources_count} sources cited
  CONFIDENCE: {confidence}

  Evaluate on these dimensions:
  1. Relevance: Does it directly address the question?
  2. Completeness: Is sufficient information provided?
  3. Accuracy: Is the information technically correct?
  4. Actionability: Does it provide concrete steps if needed?
  5. Source quality: Are sources authoritative?

  RESPOND EXACTLY IN THIS FORMAT:
  SCORE: [1-5 where 5=EXCELLENT, 4=GOOD, 3=ADEQUATE, 2=POOR, 1=INSUFFICIENT]
  CONTRIBUTES: [YES/NO]
  ADDRESSES_QUESTION: [YES/NO]
  FACTUAL_ACCURACY: [0.0-1.0]
  COMPLETENESS: [0.0-1.0]
  REASONING: [Brief explanation]

assess_agent_result: |
  Evaluate the findings from {agent_name}:

  TASK: {task}
  FINDINGS: {answer}
  CONFIDENCE: {confidence}
  SOURCES: {sources_count} sources

  Decide:
  1. Does this adequately address the research question?
  2. Should we delegate to additional agents for more perspective?
  3. Is the information complete enough to synthesize a final answer?

  RESPOND:
  QUALITY: [EXCELLENT/GOOD/ADEQUATE/POOR]
  DECISION: [COMPLETE/CONTINUE]
  REASONING: [Brief explanation]

generate_report: |
  ============================================================
  SYNTHESE MIT QUELLENPRÜFUNG
  ============================================================

  FRAGE: {query}

  RECHERCHE-ERGEBNISSE:
  {search_findings}

  ANZAHL QUELLEN: {sources_count}

  ============================================================
  KRITISCHE ANFORDERUNGEN
  ============================================================

  1. SPRACHE: Deutsche Frage → Deutsche Antwort (alle Überschriften)
     English question → English answer (all headings)

  2. EVIDENZ-BASIERT: Jede Behauptung braucht ein Zitat
     - ✅ "Die Wartung erfolgt alle 500 Betriebsstunden [1]."
     - ❌ "Die Wartung erfolgt typischerweise alle 500 Stunden."

  3. NUMERISCHE WERTE:
     - EXAKTE Werte aus Quellen mit [Quellenangabe]
     - Wenn Wert nicht in Quellen: "Der Wert für X ist nicht dokumentiert."
     - KEINE Schätzungen, KEINE "typisch/ca./etwa"

  4. FEHLENDE INFORMATION:
     - Klar benennen was NICHT gefunden wurde
     - NICHT auf externe Quellen verweisen
     - NICHT "konsultieren Sie..." sagen

  ============================================================
  BERICHTSSTRUKTUR
  ============================================================

  # [Titel]

  ## Zusammenfassung
  [3-5 Sätze mit Quellenangaben für alle Fakten]

  ## Wichtige Erkenntnisse
  - [Fakt aus Quelle] [1]
  - [Fakt aus Quelle] [2]
  (Nur Fakten mit direkter Quellenangabe)

  ## Details
  [Ausführliche Erläuterungen - jeder Absatz mit Quellenangaben]

  ## Quellen
  [1] Dokumenttitel - URL
  [2] Dokumenttitel - URL

  ## Nicht gefunden
  [Liste der Aspekte, die in den Quellen nicht behandelt wurden]

  ============================================================
  SELBSTPRÜFUNG VOR ABSENDEN
  ============================================================

  Prüfe vor dem Absenden:
  □ Hat jeder numerische Wert eine [Quellenangabe]?
  □ Habe ich "typisch/ca./etwa" verwendet? → Entfernen
  □ Habe ich Werte ohne Quellennachweis? → "Nicht dokumentiert" schreiben
  □ Sind alle Überschriften auf Deutsch (bei deutscher Frage)?

  ============================================================
  ERINNERUNG: Deutsche Frage = Deutsche Antwort!
  ============================================================

generate_report_factual: |
  ============================================================
  FACTUAL LOOKUP - DIRECT ANSWER FORMAT
  ============================================================

  QUESTION: {query}

  RESEARCH FINDINGS:
  {search_findings}

  ============================================================
  FORMAT: Brief, direct answer
  ============================================================

  Provide a SHORT, DIRECT answer. No unnecessary structure.

  1. SPRACHE: Deutsche Frage → Deutsche Antwort
     English question → English answer

  2. Start with the fact: "Die RC-3000 wiegt 450 kg [1]."
     NOT: "Die Frage bezieht sich auf..."

  3. Include ONLY:
     - The direct answer with source citation
     - Brief context if essential
     - Source reference

  ## Antwort

  [Direct answer - 1-3 sentences with [1] citations]

  **Quelle:** [1] Dokumenttitel - URL

  ============================================================
  Keep it brief! This is a fact lookup, not a research paper.
  ============================================================

generate_report_troubleshooting: |
  ============================================================
  TROUBLESHOOTING - STRUCTURED DIAGNOSIS FORMAT
  ============================================================

  PROBLEM: {query}

  RESEARCH FINDINGS:
  {search_findings}

  ============================================================
  FORMAT: Causes → Solutions → Escalation
  ============================================================

  1. SPRACHE: Deutsche Frage → Deutsche Antwort
     English question → English answer

  2. Structure your response as:

  ## Problem / Fehler

  [Brief description of the reported issue]

  ## Mögliche Ursachen

  1. **[Cause 1]** [1]
     - Symptom: [how to identify]
     - Prüfung: [how to verify]

  2. **[Cause 2]** [2]
     - Symptom: [how to identify]
     - Prüfung: [how to verify]

  ## Lösungsschritte

  1. [First action to try] [1]
  2. [Second action if first doesn't work] [1]
  3. [Third action] [2]

  ## Wenn das Problem weiterhin besteht

  [What to check next / escalation path from documentation]

  ## Quellen

  [1] Dokumenttitel - URL
  [2] Dokumenttitel - URL

  ============================================================
  Focus on ACTIONABLE steps. Each step needs a source.
  ============================================================

generate_report_procedural: |
  ============================================================
  PROCEDURAL - STEP-BY-STEP FORMAT
  ============================================================

  TASK: {query}

  RESEARCH FINDINGS:
  {search_findings}

  ============================================================
  FORMAT: Prerequisites → Steps → Verification
  ============================================================

  1. SPRACHE: Deutsche Frage → Deutsche Antwort
     English question → English answer

  2. Structure your response as:

  ## [Task Name] - Anleitung

  ### Voraussetzungen

  - [Required tool/part/condition] [1]
  - [Safety requirement] [1]

  ### Schritte

  1. **[Action verb] [object]** [1]
     - Detail if needed

  2. **[Action verb] [object]** [1]
     - Detail if needed

  3. **[Action verb] [object]** [2]

  ⚠️ **Wichtig:** [Safety warning if applicable] [1]

  ### Abschluss / Prüfung

  - [How to verify success] [1]
  - [Expected result]

  ## Quellen

  [1] Dokumenttitel - URL

  ============================================================
  Use numbered steps. Include warnings where documented.
  ============================================================

generate_report_comparison: |
  ============================================================
  SPECIFICATION COMPARISON - TABLE FORMAT
  ============================================================

  COMPARISON: {query}

  RESEARCH FINDINGS:
  {search_findings}

  ============================================================
  FORMAT: Table comparison with summary
  ============================================================

  1. SPRACHE: Deutsche Frage → Deutsche Antwort
     English question → English answer

  2. Structure your response as:

  ## Vergleich: [Product A] vs [Product B]

  | Merkmal | [Product A] | [Product B] | Quelle |
  |---------|-------------|-------------|--------|
  | [Spec 1] | [Value] | [Value] | [1] |
  | [Spec 2] | [Value] | [Value] | [2] |
  | [Spec 3] | [Value] | [Value] | [1] |

  ## Zusammenfassung

  **[Product A]** eignet sich besser für: [use case based on specs] [1]

  **[Product B]** eignet sich besser für: [use case based on specs] [2]

  ## Quellen

  [1] Dokumenttitel - URL
  [2] Dokumenttitel - URL

  ============================================================
  Use table format. Only include specs found in sources.
  Mark missing values as "nicht dokumentiert" (not as "-" or "N/A")
  ============================================================

generate_concise_answer: |
  Provide a concise answer to this question.

  QUESTION: {query}

  RESEARCH SUMMARY:
  {search_summary}

  ## CRITICAL: Language Matching
  Respond in the SAME LANGUAGE as the question (German → German, English → English).

  ## CRITICAL: No Deflection
  EXTRACT actual facts from sources. NEVER say "consult documentation" or "see source X."

  Generate a brief answer in {max_sentences} sentences or fewer.
  Be direct and actionable. Include specific information if relevant.
  Cite sources where appropriate.
