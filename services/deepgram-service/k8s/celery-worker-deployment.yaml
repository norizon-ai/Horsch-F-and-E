apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: norizon
  labels:
    app: celery-worker
    component: audio-processing
spec:
  replicas: 2  # Initial replicas (HPA will adjust this)
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
        component: audio-processing
    spec:
      containers:
      - name: celery-worker
        image: deepgram-service:latest
        command: ["celery", "-A", "src.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
        env:
        - name: DEEPGRAM_API_KEY
          valueFrom:
            secretKeyRef:
              name: deepgram-secrets
              key: api-key
        - name: DEEPGRAM_MODEL
          value: "nova-2"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: api-key
        - name: S3_ENDPOINT
          value: ""  # Blank for AWS S3
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-secrets
              key: access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: s3-secrets
              key: secret-key
        - name: S3_BUCKET
          value: "nora-meeting-data-prod"
        - name: S3_REGION
          value: "eu-central-1"
        - name: S3_PUBLIC_URL
          value: "https://cdn.norizon.ai"  # CloudFront CDN
        - name: DEBUG
          value: "false"
        resources:
          requests:
            cpu: 500m      # 0.5 CPU cores
            memory: 1Gi
          limits:
            cpu: 2000m     # 2 CPU cores
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - celery
            - "-A"
            - "src.celery_app"
            - "inspect"
            - "ping"
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - celery
            - "-A"
            - "src.celery_app"
            - "inspect"
            - "ping"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
